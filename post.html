<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#2f8843" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0e1613" media="(prefers-color-scheme: dark)" />
    <title>Essay · Dhammics</title>
    <meta name="description" content="An essay from Dhammics." />
    <link rel="icon" href="./assets/images/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://rsms.me" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap"
    />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('dhammics:theme');
          if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container">
        <a class="brand" href="./index.html" aria-label="Dhammics home">
          <span class="brand-mark" aria-hidden="true"><i data-lucide="leaf"></i></span>
          Dhammics
        </a>
        <nav class="nav" aria-label="Primary">
          <ul class="nav-links" data-nav-links>
            <li><a href="./index.html">Essays</a></li>
            <li><a href="./index.html#about">About</a></li>
            <li><a href="./admin.html" data-auth-only hidden>Admin</a></li>
          </ul>
          <div class="nav-actions">
            <button
              class="icon-btn theme-toggle"
              data-theme-toggle
              aria-label="Toggle color theme"
              type="button"
            >
              <i data-lucide="moon"></i>
            </button>
            <a class="btn btn-ghost" href="./login.html" data-guest-only>
              <i data-lucide="log-in"></i> Sign in
            </a>
            <a class="btn btn-secondary" href="./admin.html" data-auth-only hidden>
              <i data-lucide="pen-line"></i> Write
            </a>
            <button class="icon-btn nav-toggle" data-nav-toggle aria-label="Toggle menu" type="button">
              <i data-lucide="menu"></i>
            </button>
          </div>
        </nav>
      </div>
    </header>

    <main id="main" data-post-shell>
      <div class="container container-narrow post-loading">
        <div class="spinner" aria-hidden="true"></div>
        <p class="muted">Loading essay…</p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <a class="brand" href="./index.html">
          <span class="brand-mark" aria-hidden="true"><i data-lucide="leaf"></i></span>
          Dhammics
        </a>
        <p class="footer-meta">Offered in the spirit of dana.</p>
      </div>
    </footer>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script type="module" src="./assets/js/main.js"></script>
    <script type="module" src="./assets/js/post.js"></script>
  </body>
</html>
