<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>User Panel · Dhammics</title>
    <meta name="description" content="User login and engagement panel for Dhammics." />
    <link rel="icon" href="./assets/images/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;500;700;900&display=swap"
    />
    <link rel="stylesheet" href="./assets/css/main.css" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('dhammics:theme');
          if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
        } catch (_) {}
      })();
    </script>
  </head>
  <body data-page="user">
    <div data-app-root></div>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <script type="module" src="./assets/js/app-shell.js"></script>
  </body>
</html>
