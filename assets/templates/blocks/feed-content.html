<main id="main" class="section">
  <div class="container">
    <div class="section-head">
      <div>
        <h1 class="section-title">Latest Feed</h1>
        <p class="section-desc">
          Use <strong>Latest</strong> for chronological order. Use
          <strong>Reranked by favorites</strong> to push your favorited blogs higher.
        </p>
      </div>
      <div class="field" style="min-width:280px">
        <label for="feed-mode">Feed mode</label>
        <select id="feed-mode" class="select" data-feed-mode>
          <option value="latest">Latest posts</option>
          <option value="reranked">Reranked by favorites</option>
        </select>
      </div>
    </div>
    <div class="post-grid" data-feed-grid></div>
  </div>
</main>
